x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  # Bổ sung dòng này: Gắn user ID từ file .env của bạn để tránh lỗi phân quyền (Permission Denied) trên Linux
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__PARALLELISM: 1
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__WEBSERVER__SECRET_KEY: change-me-in-production
    # Bổ sung timezone để đồng bộ giờ chạy DAG với biến TZ trong .env
    TZ: "${TZ:-UTC}"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./config:/opt/airflow/config
    - ./.dlt:/opt/airflow/.dlt
    - ./data:/opt/airflow/data
    - ./dbt:/opt/airflow/dbt
    - ./logs:/opt/airflow/logs
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Đảm bảo quyền sở hữu cho các thư mục được mount trước khi khởi tạo
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/{dags,logs,data} 2>/dev/null || true
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    depends_on:
      airflow-db:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver --port 8086
    ports:
      - "8086:8086"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./config/servers.json:/pgadmin4/servers.json:ro
    restart: always

  test-db:
    image: postgres:16
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: raw_db
    ports:
      - "5434:5432"
    volumes:
      - test-db-data:/var/lib/postgresql/data
    restart: always

volumes:
  airflow-db-data:
  pgadmin-data:
  test-db-data: